version: "3.9"

services:
  population-dashboard:
    build: .
    container_name: population-dashboard
    ports:
      - "8000:8000"    # FastAPI backend
      - "8501:8501"    # Streamlit frontend
    volumes:
      - db-data:/app    # Persist SQLite database
    restart: unless-stopped

volumes:
  db-data:
